<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MIMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    /* Version A only: scrollable subbar with edge arrows for long tab rows */
    .subbar { padding: 0; }
    .subbar-scroll {
      flex: 1; display: flex; align-items: stretch;
      overflow-x: auto; scroll-behavior: smooth;
      padding: 0 8px; scrollbar-width: none;
    }
    .subbar.is-tabs .subbar-scroll { padding: 0 16px; }
    .subbar-scroll::-webkit-scrollbar { display: none; }
    .subbar-arrow {
      position: relative; flex: none; width: 38px; border: 0; cursor: pointer; padding: 0;
      background: var(--bg-surface); color: var(--text-secondary);
      display: none; align-items: center; justify-content: center; z-index: 2;
    }
    .subbar-arrow.is-shown { display: inline-flex; }
    /* soft fade so items dissolve under the arrow, plus a hairline divider */
    .subbar-arrow::before {
      content: ""; position: absolute; top: 0; bottom: 0; width: 20px; pointer-events: none;
    }
    .subbar-arrow.left { border-right: 1px solid var(--divider); }
    .subbar-arrow.right { border-left: 1px solid var(--divider); }
    .subbar-arrow.left::before { left: 100%; background: linear-gradient(90deg, var(--bg-surface), transparent); }
    .subbar-arrow.right::before { right: 100%; background: linear-gradient(270deg, var(--bg-surface), transparent); }
    .subbar-arrow:hover { background: var(--hover); color: var(--text-primary); }
  </style>
</head>
<body>
  <div id="chrome"></div>
  <div class="subbar" id="subbar" style="display:none"></div>
  <div class="mims-body">
    <main class="mims-main">
      <div class="mims-content" id="content"></div>
    </main>
  </div>
  <div id="footer"></div>

  <script src="../assets/ia.js"></script>
  <script src="../assets/core.js"></script>
  <script>
    /* Prototype A — top nav + persistent subcategory bar (dropdowns), full-page stubs */
    window.CLARITY_ID = "xbir7mlhe6"; // shared Clarity project
    injectClarity(window.CLARITY_ID, "A");

    document.getElementById("chrome").innerHTML = headerHTML();
    document.getElementById("footer").innerHTML = footerHTML();

    const nav = document.getElementById("mims-nav");
    const subbar = document.getElementById("subbar");
    const content = document.getElementById("content");
    let activeManagerId = null;
    let currentItem = null;
    let openMenuEl = null;    // open subbar-category dropdown
    let subCloseTimer = null;
    let openMega = null;      // open top-level mega menu
    let megaTimer = null;

    /* ---------- top-nav managers: hover mega menu (same structure as B) ----- */
    const managers = document.createElement("div");
    managers.className = "mims-managers";
    MIMS_IA.managers.forEach(m => {
      const wrap = document.createElement("div");
      wrap.style.position = "relative";
      wrap.style.height = "100%";

      const b = document.createElement("button");
      b.className = "mims-manager";
      b.dataset.id = m.id;
      b.innerHTML = `${escapeHTML(m.name)} ${SVG.chevDown}`;
      wrap.appendChild(b);

      const mega = document.createElement("div");
      mega.className = "menu-surface mega";
      if (m.type === "grouped") {
        m.categories.forEach(cat => {
          const g = document.createElement("div");
          g.className = "mega-group";
          g.innerHTML = `<div class="menu-cat-label">${escapeHTML(cat.name)}</div>`;
          cat.items.forEach(item => {
            const it = document.createElement("button");
            it.className = "menu-item";
            it.textContent = item;
            it.addEventListener("click", () => goToItem(m, item));
            g.appendChild(it);
          });
          mega.appendChild(g);
        });
      } else {
        mega.style.columns = "1";
        mega.style.minWidth = "260px";
        m.tabs.forEach(tab => {
          const it = document.createElement("button");
          it.className = "menu-item";
          it.textContent = tab;
          it.addEventListener("click", () => goToItem(m, tab));
          mega.appendChild(it);
        });
      }
      wrap.appendChild(mega);

      const open = () => { clearTimeout(megaTimer); openMegaMenu(b, mega); };
      b.addEventListener("mouseenter", open);
      b.addEventListener("click", open);
      wrap.addEventListener("mouseenter", () => clearTimeout(megaTimer));
      wrap.addEventListener("mouseleave", () => { megaTimer = setTimeout(closeMega, 160); });

      managers.appendChild(wrap);
    });
    nav.appendChild(managers);

    function openMegaMenu(btn, mega) {
      if (openMega && openMega !== mega) closeMega();
      mega.style.left = "0"; mega.style.right = "auto";
      mega.classList.add("is-open");
      const r = mega.getBoundingClientRect();
      if (r.right > window.innerWidth - 8) { mega.style.left = "auto"; mega.style.right = "0"; }
      openMega = mega;
    }
    function closeMega() {
      if (openMega) { openMega.classList.remove("is-open"); openMega = null; }
    }

    /* ---------- navigate to a page (drives the subbar context) -------------- */
    function goToItem(manager, item) {
      activeManagerId = manager.id;
      currentItem = item;
      closeMega();
      closeDropdown();
      managers.querySelectorAll(".mims-manager").forEach(btn => btn.classList.toggle("is-active", btn.dataset.id === manager.id));
      renderSubbar(manager);
      content.innerHTML = stubHTML(item);
    }

    /* ---------- persistent sub-category bar --------------------------------- */
    function makeArrow(dir) {
      const a = document.createElement("button");
      a.className = "subbar-arrow " + dir;
      a.setAttribute("aria-label", dir === "left" ? "Scroll left" : "Scroll right");
      const d = dir === "left" ? "M15 6l-6 6 6 6" : "M9 6l6 6-6 6";
      a.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="${d}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      return a;
    }
    let subbarUpdateArrows = null;

    function renderSubbar(m) {
      subbar.innerHTML = "";
      subbar.style.display = "flex";
      subbar.classList.toggle("is-tabs", m.type === "tabs");

      // Long tab rows (e.g. Operations Outbound) overflow — wrap items in a
      // horizontal scroll track with edge arrows that show only when needed.
      const leftArrow = makeArrow("left");
      const track = document.createElement("div");
      track.className = "subbar-scroll";
      const rightArrow = makeArrow("right");
      subbar.append(leftArrow, track, rightArrow);

      const updateArrows = () => {
        const max = track.scrollWidth - track.clientWidth - 1;
        leftArrow.classList.toggle("is-shown", track.scrollLeft > 0);
        rightArrow.classList.toggle("is-shown", track.scrollLeft < max);
      };
      leftArrow.addEventListener("click", () => track.scrollBy({ left: -260, behavior: "smooth" }));
      rightArrow.addEventListener("click", () => track.scrollBy({ left: 260, behavior: "smooth" }));
      track.addEventListener("scroll", () => { updateArrows(); closeDropdown(); });
      subbarUpdateArrows = updateArrows;
      requestAnimationFrame(updateArrows);

      if (m.type === "tabs") {
        m.tabs.forEach(tab => {
          const b = document.createElement("button");
          b.className = "subbar-item" + (tab === currentItem ? " is-active" : "");
          b.textContent = tab;
          b.addEventListener("click", () => goToItem(m, tab));
          track.appendChild(b);
        });
        return;
      }

      m.categories.forEach(cat => {
        const b = document.createElement("button");
        b.className = "subbar-item";
        b.dataset.cat = cat.name;
        // Single-item category: no dropdown — go straight there, no chevron.
        if (cat.items.length === 1) {
          const only = cat.items[0];
          b.textContent = cat.name;
          b.addEventListener("mouseenter", () => { cancelSubClose(); closeDropdown(); });
          b.addEventListener("click", e => { e.stopPropagation(); goToItem(m, only); });
          track.appendChild(b);
          return;
        }
        b.innerHTML = `${escapeHTML(cat.name)} ${SVG.chevDown}`;
        // Open the dropdown on hover (and click); a close-delay lets the pointer
        // travel down into the menu without it disappearing.
        b.addEventListener("mouseenter", () => {
          cancelSubClose();
          if (!(openMenuEl && openMenuEl._cat === cat.name)) openDropdown(b, cat);
        });
        b.addEventListener("mouseleave", scheduleSubClose);
        b.addEventListener("click", e => {
          e.stopPropagation();
          if (openMenuEl && openMenuEl._cat === cat.name) { closeDropdown(); return; }
          openDropdown(b, cat);
        });
        track.appendChild(b);
      });
      highlightCurrentCategory();
    }

    // Mark the subbar category that holds the currently-open item (Figma's
    // persistent "Warehouse Setup" highlight).
    function highlightCurrentCategory() {
      const mgr = activeManagerId ? iaManager(activeManagerId) : null;
      subbar.querySelectorAll(".subbar-item").forEach(btn => {
        const cat = mgr && mgr.categories ? mgr.categories.find(c => c.name === btn.dataset.cat) : null;
        btn.classList.toggle("is-current", !!(cat && cat.items.includes(currentItem)));
      });
    }

    function cancelSubClose() { if (subCloseTimer) { clearTimeout(subCloseTimer); subCloseTimer = null; } }
    function scheduleSubClose() { cancelSubClose(); subCloseTimer = setTimeout(closeDropdown, 180); }

    function openDropdown(anchor, cat) {
      closeDropdown();
      anchor.classList.add("is-open");
      const menu = document.createElement("div");
      menu.className = "menu-surface";
      menu._cat = cat.name;
      menu.style.position = "absolute";
      menu.style.zIndex = 50;
      menu.addEventListener("mouseenter", cancelSubClose);
      menu.addEventListener("mouseleave", scheduleSubClose);
      cat.items.forEach(item => {
        const it = document.createElement("button");
        it.className = "menu-item" + (item === currentItem ? " is-active" : "");
        it.textContent = item;
        it.addEventListener("click", () => goToItem(iaManager(activeManagerId), item));
        menu.appendChild(it);
      });
      document.body.appendChild(menu);
      const r = anchor.getBoundingClientRect();
      menu.style.left = r.left + "px";
      menu.style.top = r.bottom + "px";
      menu.style.minWidth = "220px";
      openMenuEl = menu;
      openMenuEl._anchor = anchor;
    }
    function closeDropdown() {
      cancelSubClose();
      if (openMenuEl) {
        if (openMenuEl._anchor) openMenuEl._anchor.classList.remove("is-open");
        openMenuEl.remove();
        openMenuEl = null;
      }
    }
    document.addEventListener("click", e => {
      if (openMenuEl && !openMenuEl.contains(e.target) && !openMenuEl._anchor.contains(e.target)) closeDropdown();
      if (openMega && !openMega.parentElement.contains(e.target)) closeMega();
    });

    window.addEventListener("resize", () => { if (subbarUpdateArrows) subbarUpdateArrows(); });

    // Quick links: jump straight to any page.
    initQuickLinks(e => goToItem(iaManager(e.managerId), e.item));

    // Landing matches the Figma A default: Configuration selected, Warehouse
    // Setup as the current category, and the "Areas" search page in content.
    goToItem(iaManager("configuration"), "Areas");
  </script>
</body>
</html>
