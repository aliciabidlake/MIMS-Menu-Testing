		<meta charset="utf-8" />

		<title>MIMS Usability Study</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
		<style>
			.mm-root {
				--blue: #1477c6;
				--blue-dark: #0f5a98;
				--seagull: #74abe3;
				--seagull-tint: #eaf3fb;
				--ink: #010103;
				--muted: #6b7785;
				--line: #e6eaf0;
				--bg: #f6f8fb;
				--card: #ffffff;
				--font: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
			}

			.mm-root * {
				box-sizing: border-box;
			}

			.mm-root {
				margin: 0;
				font-family: var(--font);
				color: var(--ink);
				background: var(--bg);
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				-webkit-font-smoothing: antialiased;
			}

			.mm-bar {
				height: 4px;
				background: linear-gradient(90deg, var(--blue) 0%, var(--seagull) 100%);
			}

			.mm-wrap {
				flex: 1;
				width: 100%;
				max-width: 880px;
				margin: 0 auto;
				padding: 72px 28px 56px;
				text-align: center;
				display: flex;
				flex-direction: column;
				align-items: center;
			}

			.mm-logo {
				height: 36px;
				width: auto;
				margin-bottom: 48px;
			}

			.mm-title {
				font-size: clamp(28px, 4.4vw, 40px);
				font-weight: 800;
				letter-spacing: -0.8px;
				margin: 0 0 12px;
			}

			.mm-sub {
				font-size: 16px;
				line-height: 1.6;
				color: var(--muted);
				margin: 0 0 48px;
				max-width: 46ch;
			}

			.mm-grid {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 20px;
				width: 100%;
			}

			.mm-card {
				display: flex;
				flex-direction: column;
				align-items: center;
				background: var(--card);
				border: 1px solid var(--line);
				border-radius: 16px;
				padding: 34px 24px 30px;
				text-decoration: none;
				color: inherit;
				transition:
					transform 0.2s ease,
					box-shadow 0.2s ease,
					border-color 0.2s ease;
			}

			.mm-card:hover,
			.mm-card:focus-visible {
				transform: translateY(-6px);
				border-color: transparent;
				box-shadow: 0 18px 40px -16px rgba(20, 119, 198, 0.45);
				outline: none;
			}
			.mm-card:focus-visible {
				box-shadow: 0 0 0 3px rgba(20, 119, 198, 0.5);
			}

			.mm-badge {
				width: 64px;
				height: 64px;
				border-radius: 50%;
				background: var(--seagull-tint);
				color: var(--blue);
				font-size: 28px;
				font-weight: 800;
				display: grid;
				place-items: center;
				margin-bottom: 18px;
				transition:
					background 0.2s ease,
					color 0.2s ease,
					transform 0.2s ease;
			}
			.mm-card:hover .mm-badge,
			.mm-card:focus-visible .mm-badge {
				background: linear-gradient(135deg, var(--blue), var(--blue-dark));
				color: #fff;
				transform: scale(1.08);
			}

			.mm-card h2 {
				font-size: 16px;
				font-weight: 600;
				margin: 0;
				letter-spacing: 0.2px;
			}

			.mm-foot {
				max-width: 880px;
				width: 100%;
				margin: 0 auto;
				padding: 24px 28px;
				border-top: 1px solid var(--line);
				font-size: 12px;
				color: var(--muted);
				text-align: center;
			}

			@media (max-width: 720px) {
				.mm-grid {
					grid-template-columns: 1fr;
				}
				.mm-wrap {
					padding: 48px 22px 40px;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				.mm-card,
				.mm-badge {
					transition: none;
				}
			}
		</style>
