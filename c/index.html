<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MIMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    /* Version C only: sidebar manager title as h3 @ 24px */
    h3.sidenav-title { font-size: 24px; margin: 0; }
  </style>
</head>
<body>
  <div id="chrome"></div>
  <div class="mims-body">
    <aside class="sidenav" id="sidenav"></aside>
    <main class="mims-main">
      <div class="mims-content" id="content"></div>
    </main>
  </div>
  <div id="footer"></div>

  <!-- overarching drawer -->
  <div class="drawer-scrim" id="drawer-scrim"></div>
  <nav class="drawer" id="drawer" style="display:none" aria-label="All managers"></nav>
  <div class="menu-surface flyout" id="flyout"></div>

  <script src="../assets/ia.js"></script>
  <script src="../assets/core.js"></script>
  <script>
    /* Prototype C — side nav: local contextual rail + hamburger overarching
       drawer (all managers, click-expand, hover-flyout). Full-page stubs. */
    window.CLARITY_ID = "xbir7mlhe6"; // shared Clarity project
    injectClarity(window.CLARITY_ID, "C");

    document.getElementById("chrome").innerHTML = headerHTML({ hamburger: true });
    document.getElementById("footer").innerHTML = footerHTML();
    addExitToMenu();
    document.querySelector(".mims-hamburger").style.display = "inline-flex";

    const sidenav = document.getElementById("sidenav");
    const content = document.getElementById("content");
    const drawer = document.getElementById("drawer");
    const drawerScrim = document.getElementById("drawer-scrim");
    const flyout = document.getElementById("flyout");
    let currentManagerId = null;
    let currentItem = null;

    /* ---------- local contextual rail ---------- */
    function renderLocalRail(manager, activeItem) {
      sidenav.innerHTML = "";
      const title = document.createElement("h3");
      title.className = "sidenav-title";
      title.textContent = manager.drawerName;
      sidenav.appendChild(title);

      if (manager.type === "tabs") {
        manager.tabs.forEach(tab => sidenav.appendChild(localItem(tab, manager, activeItem)));
        return;
      }
      const anyActive = manager.categories.some(c => c.items.includes(activeItem));
      manager.categories.forEach((cat, idx) => {
        const catBtn = document.createElement("button");
        catBtn.className = "sidenav-cat";
        catBtn.innerHTML = `<span>${escapeHTML(cat.name)}</span> ${SVG.chevDown}`;
        const items = document.createElement("div");
        items.className = "sidenav-items";
        const hasActive = cat.items.includes(activeItem);
        // Open the category that holds the active item; if none is active, open the first.
        if (hasActive || (!anyActive && idx === 0)) { catBtn.classList.add("is-open"); items.classList.add("is-open"); }
        cat.items.forEach(item => items.appendChild(localItem(item, manager, activeItem)));
        catBtn.addEventListener("click", () => {
          catBtn.classList.toggle("is-open");
          items.classList.toggle("is-open");
        });
        sidenav.appendChild(catBtn);
        sidenav.appendChild(items);
      });
    }
    function localItem(label, manager, activeItem) {
      const b = document.createElement("button");
      b.className = "sidenav-item" + (label === activeItem ? " is-active" : "");
      b.textContent = label;
      b.addEventListener("click", () => selectItem(manager, label));
      return b;
    }

    /* ---------- navigation ---------- */
    function selectItem(manager, item) {
      currentManagerId = manager.id;
      currentItem = item;
      clarityEvent("navigate");
      clarityTag("current_manager", manager.drawerName);
      clarityTag("current_page", item);
      renderLocalRail(manager, item);
      content.innerHTML = stubHTML(item);
      closeDrawer();
    }

    /* ---------- overarching drawer ---------- */
    function buildDrawer() {
      drawer.innerHTML = "";
      MIMS_IA.managers.forEach(m => {
        const mBtn = document.createElement("button");
        mBtn.className = "drawer-manager" + (m.id === currentManagerId ? " is-active" : "");
        mBtn.innerHTML = `${MANAGER_ICON[m.id] || ""}<span>${escapeHTML(m.drawerName)}</span> ${SVG.chevDown}`;
        const cats = document.createElement("div");
        cats.className = "drawer-cats";

        if (m.type === "tabs") {
          m.tabs.forEach(tab => {
            const t = document.createElement("button");
            t.className = "drawer-cat";
            t.innerHTML = `<span class="dot"></span><span>${escapeHTML(tab)}</span>`;
            t.addEventListener("click", e => { e.stopPropagation(); selectItem(m, tab); });
            cats.appendChild(t);
          });
        } else {
          const activeCat = m.id === currentManagerId
            ? m.categories.find(cat => cat.items.includes(currentItem))
            : null;
          m.categories.forEach(cat => {
            const c = document.createElement("button");
            // Single-item category: no submenu — go straight there, no arrow, no flyout.
            if (cat.items.length === 1) {
              const only = cat.items[0];
              const isActive = m.id === currentManagerId && only === currentItem;
              c.className = "drawer-cat" + (isActive ? " is-active" : "");
              c.innerHTML = `<span class="dot"></span><span>${escapeHTML(cat.name)}</span>`;
              c.addEventListener("mouseenter", hideFlyout);
              c.addEventListener("click", e => { e.stopPropagation(); selectItem(m, only); });
            } else {
              c.className = "drawer-cat" + (cat === activeCat ? " is-active" : "");
              c.innerHTML = `<span class="dot"></span><span>${escapeHTML(cat.name)}</span> ${SVG.chevRight}`;
              c.addEventListener("mouseenter", () => showFlyout(c, m, cat));
              c.addEventListener("click", e => { e.stopPropagation(); showFlyout(c, m, cat); });
            }
            cats.appendChild(c);
          });
        }

        mBtn.addEventListener("click", () => {
          const open = mBtn.classList.toggle("is-open");
          cats.classList.toggle("is-open", open);
          hideFlyout();
        });
        if (m.id === currentManagerId) { mBtn.classList.add("is-open"); cats.classList.add("is-open"); }

        drawer.appendChild(mBtn);
        drawer.appendChild(cats);
      });
    }

    /* The flyout opens to the right of the drawer with a small gap (matching the
       Figma spec). A short close-delay lets the pointer travel across that gap
       and into the flyout without it vanishing — so its items stay clickable. */
    let hideTimer = null;
    function cancelHide() { if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; } }
    function scheduleHide() { cancelHide(); hideTimer = setTimeout(hideFlyout, 220); }

    function showFlyout(anchor, manager, cat) {
      cancelHide();
      clarityEvent("open_flyout");
      drawer.querySelectorAll(".drawer-cat").forEach(x => x.classList.remove("is-hover"));
      anchor.classList.add("is-hover");
      flyout.innerHTML = "";
      cat.items.forEach(item => {
        const isActive = manager.id === currentManagerId && item === currentItem;
        const b = document.createElement("button");
        b.className = "menu-item" + (isActive ? " is-active" : "");
        b.textContent = item;
        b.addEventListener("click", () => selectItem(manager, item));
        flyout.appendChild(b);
      });
      const r = anchor.getBoundingClientRect();
      flyout.style.left = (drawer.getBoundingClientRect().right + 8) + "px";
      flyout.style.top = r.top + "px";
      flyout.classList.add("is-open");
    }
    function hideFlyout() {
      cancelHide();
      flyout.classList.remove("is-open");
      drawer.querySelectorAll(".drawer-cat").forEach(x => x.classList.remove("is-hover"));
    }
    // Keep the flyout alive while the pointer is over it; close shortly after leaving either surface.
    flyout.addEventListener("mouseenter", cancelHide);
    flyout.addEventListener("mouseleave", scheduleHide);
    drawer.addEventListener("mouseleave", scheduleHide);
    drawer.addEventListener("mouseenter", cancelHide);

    function openDrawer() { clarityEvent("open_drawer"); buildDrawer(); drawer.style.display = "block"; drawer.classList.add("is-open"); drawerScrim.classList.add("is-open"); }
    function closeDrawer() { drawer.classList.remove("is-open"); drawer.style.display = "none"; drawerScrim.classList.remove("is-open"); hideFlyout(); }
    document.querySelector(".mims-hamburger").addEventListener("click", () => {
      drawerScrim.classList.contains("is-open") ? closeDrawer() : openDrawer();
    });
    drawerScrim.addEventListener("click", closeDrawer);
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

    // Quick links: jump straight to any page (also sets the local rail).
    initQuickLinks(e => selectItem(iaManager(e.managerId), e.item));

    /* ---------- landing ----------
       Match the Figma default state: Configuration Manager rail with "Areas"
       selected, rather than an empty placeholder. */
    selectItem(iaManager("configuration"), "Areas");
  </script>
</body>
</html>
